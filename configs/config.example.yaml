# 文件稳定检测参数，默认稳定30秒后开始处理
poll_interval: 1s
stable_duration: 30s
# 文件上传失败后，等待指定时间后重试
retry_interval: 10m
# 单个文件连续失败达到该次数后停止重试，0 表示无限重试
max_retry_count: 5
# rclone并发上传任务数量
max_parallel_uploads: 5
# 文件监控后缀列表
extensions:
  - .mkv
  - .mp4
  - .m2ts
  - .ts
# rclone上传参数
rclone_args:
  - --drive-chunk-size=256M
  - --checkers=5
  - --transfers=5
  - --drive-stop-on-upload-limit
  - --stats=1s
  - --stats-one-line
  - -v
# HTTP代理设置，enabled = true才会生效
proxy:
  enabled: false
  scheme: http
  host: 127.0.0.1
  port: 7890
  username: ""
  password: ""
# Telegram 通知设置，enabled = true 才会在达到最大重试次数后发送最终失败通知
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
# 任务列表，source_dir是监控源目录，link_dir是硬链接目录，rclone_remote是rclone远端目录
jobs:
  - name: 4K-REMUX
    source_dir: /dld/upload/4K.REMUX.SGNB
    link_dir: /dld/gd_upload/4K.REMUX.SGNB
    rclone_remote: gd1:/sync/Movie/4K.REMUX.SGNB
    # 上传成功后是否删除源文件，默认 false
    delete_source_after_upload: false
  - name: MOVIE
    source_dir: /dld/upload/Movie-2025
    link_dir: /dld/gd_upload/Movie-2025
    rclone_remote: gd1:/sync/Movie/Movie-2025
    delete_source_after_upload: false
